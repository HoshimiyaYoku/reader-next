services:
  reader:
    image: ${READER_IMAGE:-ghcr.io/maple0517/reader-next:latest}
    container_name: ${READER_CONTAINER_NAME:-reader-next-local}
    restart: unless-stopped
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 18080
      DATABASE_URL: sqlite:/app/storage/reader.db?mode=rwc
      STORAGE_DIR: /app/storage
      ASSETS_DIR: /app/storage/assets
      WEB_ROOT: /app/web/dist
      LOG_LEVEL: info
      REQUEST_TIMEOUT_SECS: 15
    ports:
      - "${READER_PORT:-28080}:18080"
    volumes:
      - ../storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
