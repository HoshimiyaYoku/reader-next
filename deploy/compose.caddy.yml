services:
  reader:
    image: ${READER_IMAGE:-ghcr.io/maple0517/reader-next:latest}
    container_name: reader-next-prod
    restart: unless-stopped
    env_file:
      - path: ../.env.prod
        required: false
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 18080
      DATABASE_URL: sqlite:/app/storage/reader.db?mode=rwc
      STORAGE_DIR: /app/storage
      ASSETS_DIR: /app/storage/assets
      WEB_ROOT: /app/web/dist
      LOG_LEVEL: info
      REQUEST_TIMEOUT_SECS: 15
    volumes:
      - /opt/reader/storage:/app/storage
    networks:
      - reader-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: reader-caddy
    restart: unless-stopped
    depends_on:
      - reader
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/reader/caddy-data:/data
      - /opt/reader/caddy-config:/config
    networks:
      - reader-net

networks:
  reader-net:
    name: reader-net
